<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idul Fitri - Amplop Spesial</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stars" id="stars"></div>

    <div class="lantern-wrapper lantern-left">
        <div class="lantern-cable"></div>
        <div class="lantern">
            <div class="lantern-top"></div>
            <div class="lantern-body">
                <div class="lantern-glow"></div>
            </div>
            <div class="lantern-bottom"></div>
        </div>
    </div>

    <div class="lantern-wrapper lantern-right">
        <div class="lantern-cable"></div>
        <div class="lantern">
            <div class="lantern-top"></div>
            <div class="lantern-body">
                <div class="lantern-glow"></div>
            </div>
            <div class="lantern-bottom"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="envelope-container" id="envelope">

            <div class="envelope-back"></div>

            <div class="card" id="card">
                <div class="card-inner">
                    <span class="arabic">عيد مبارك</span>
                    <h1 class="gold-text">Idul Fitri</h1>
                    <div class="divider"></div>
                    <p>Mohon Maaf Lahir & Batin</p>
                    <a href="https://drive.google.com/file/d/16577534646464646464646464646464/view?usp=sharing">THR</a>
                    <small>1447 Hijriah</small>
                </div>
            </div>

            <div class="envelope-front">
                <div class="fold-left"></div>
                <div class="fold-right"></div>
                <div class="fold-bottom"></div>
            </div>

            <div class="envelope-flap">
                <div class="flap-triangle"></div>
                <div class="seal">🌙</div>
            </div>

        </div>
        <p class="hint">Klik Amplop untuk Membuka</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
