<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idul Fitri - Amplop Spesial</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="stars" id="stars"></div>

    <div class="main-wrapper">
        <div class="envelope-container" id="envelope">
            
            <div class="envelope-back"></div>
            
            <div class="card" id="card">
                <div class="card-inner">
                    <span class="arabic">عيد مبارك</span>
                    <h1 class="gold-text">Idul Fitri</h1>
                    <div class="divider"></div>
                    <p>Mohon Maaf Lahir & Batin</p>
                    <small>1447 Hijriah</small>
                </div>
            </div>

            <div class="envelope-front">
                <div class="fold-left"></div>
                <div class="fold-right"></div>
                <div class="fold-bottom"></div>
            </div>

            <div class="envelope-flap">
                <div class="flap-triangle"></div>
                <div class="seal">🌙</div>
            </div>

        </div>
        <p class="hint">Klik Amplop untuk Membuka</p>
    </div>

    <script src="script.js"></script>
</body>

</html>
